  <style>
     /* Keyboard users need to see where focus is */
    :focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    /* Respect users who prefer less motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* =============================================
       BACKGROUND COLOUR
       ============================================= */
    body {
      background: #6A9475; /* wall: #87ad91 floor: #6A9475*/
    }

    /* =============================================
       IMAGE POSITIONING SYSTEM
       How it works:
       - .img-layer is a fixed container covering the
         full screen, anchored to the TOP-LEFT corner.
       - Each .img-item is positioned relative to that
         top-left corner using:
             top:   distance DOWN  from top of screen
             left: distance LEFT  from left of screen
       - Change width/height on each .img-item to scale.
       - Set pointer-events: none on non-clickable images.
       ============================================= */

    .img-layer {
      position: fixed;
      top: 7vh;
      left: 50vw;      /* ----------------------------------- */
      width: 0;
      height: 0;
      pointer-events: none; /* layer itself doesn't block clicks */
      z-index: 10;          /* sits above page content; lower if needed */
    }

    .img-item {
      position: absolute;
      display: block;
      overflow: hidden;
    }

    .img-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Non-clickable images */
    .img-item.static {
      pointer-events: none;
    }

    /* Clickable images */
    .img-item.clickable {               
      pointer-events: auto;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;        
    }

    .img-item.clickable:hover {  /* what image looks like when hovering over */
      opacity: 1;
      transform: scale(1.03);
    }

    /* =============================================
       IMAGE POSITIONS
       Adjust top / left / width / height freely.
       ============================================= */

    #wall {
      width: 150vw;
      translate: -50vw -15vw;
      opacity: 0.5;
    }

    #shelf {
      width: 180vw;
      translate: -100vw 13vw;
    }

    #recordPlayer{
      width: 80vw;
      translate: -36vw 9.7vw;
    }

    #rewind-button{
      width: 10vw;
      translate: -35vw 26.3vw;
    }

    #play-pause-button{
      width: 10vw;
      translate: -25.5vw 26.4vw;
    }

    #skip-button{
      width: 10vw;
      translate: -15.9vw 26.2vw;
    }

 /* button section*/
    #button-board {
     width: 16vw;
     translate: 34vw -3.2vw;
    }

    #back-button {
      width: 3.1vw;
      translate: 45.3vw -2.5vw;
    }

    #menu-button {
     width: 4.95vw;
      translate: 41.5vw -2.8vw;
    }

    #home-button {
      width: 4.95vw;
      translate: 38.2vw -2.85vw;
    }

    #music-button {
     width: 3.2vw;
      translate: 35.8vw -2.2vw;
    }
   /* button section ends*/
/* MUSIC PLAYER */

    #song-title {
        position: static;
        width: 30vw;
        translate: -4.7vw 30vw;
        font-size: 1.5vw;
        font-family: "Pixelify Sans", sans-serif;

    }

    /* --- Individual button wrapper */
    .player-btn {
        cursor: pointer;
    }

   /* volume stuff */
    #volume-control {
    position: static;
    width: 24.5vw;
    translate: -5.6vw 26.5vw;
    }

    #volume-track-container {
    position: relative;
    display: inline-block;
    cursor: pointer;
    overflow: visible;
    width: 24.5vw; 
    }

    #volume-track-container {
    position: relative;
    width: 24vw;
    display: inline-block;
    }

    #volume-knob-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 3vw;
    height: 3vw;
    overflow: visible;
    }

    #volume-knob:active {
    cursor: grabbing;
    }

    #volume-track-container .img-item.static {
    position: relative;
    width: 24.5vw;
    height: auto;
    overflow: visible;
    }

  </style>


</head>
<body>

  <!-- =============================================

  <!-- ============================================================
     MUSIC PLAYER

<div id="music-player" class="img-layer" aria-hidden="true">

  <!-- Playback controls -->

    <!-- Rewind / previous -->
    <div
      id="rewind-button"
      class="img-item clickable"
      role="button"
      tabindex="0"

    <div

      tabindex="0"
      aria-label="Play or pause the current song"
      onclick="togglePlayPause()"
    >
      <img 
      id="play-pause-img" 
      src="music/pause-play.png" 
      alt="Play/Pause button">
    </div>

    <!-- Skip / next -->
    <div
      id="skip-button"
      class="img-item clickable"
      role="button"
      tabindex="0"

      onclick="nextSong()"
    >

      alt="Skip button">
    </div>

  </div>

  <!-- Volume control -->
    <div id="volume-control">
        <div id="volume-track-container">
            <div class="img-item static">
                <img src="music/slider.png" id="volume-track" alt="volume track">
            </div>
            <div id="volume-knob-wrapper" class="img-item clickable">
                <img src="music/knob.png" id="volume-knob" alt="volume knob" draggable="false">
            </div>
        </div>
    </div>

  <!-- Hidden audio element — the browser handles actual playback -->
  <audio id="audio-player"></audio>


  
</div>

<script>
  // =============================================
  // PAGE TRANSITION — "MELT" EFFECT
  // Tweak these two values to adjust the feel:
  // =============================================
  const TRANSITION_DURATION = 300;   // milliseconds — how long each half takes
  const TRANSITION_DRIFT    = 20;    // pixels — how far down the page "melts"

  // Inject the transition styles
  const style = document.createElement('style');
  style.textContent = `
    .img-layer {
      transition: opacity ${TRANSITION_DURATION}ms ease,
                  transform ${TRANSITION_DURATION}ms ease,
                  filter ${TRANSITION_DURATION}ms ease;
    }
    .img-layer.melt-out {
      opacity: 0;
      transform: translateY(${TRANSITION_DRIFT}px);
      filter: blur(6px);
    }
    .img-layer.melt-in {
      opacity: 0;
      transform: translateY(-${TRANSITION_DRIFT}px);
      filter: blur(6px);
    }
  `;
  document.head.appendChild(style);

// Fade IN on page load — targets ALL img-layer divs
  const layers = document.querySelectorAll('.img-layer');
  layers.forEach(l => l.classList.add('melt-in'));
  requestAnimationFrame(() => {
    requestAnimationFrame(() => layers.forEach(l => l.classList.remove('melt-in')));
  });

  // Fade OUT then navigate on click/keydown
  function navigateTo(url) {
    layers.forEach(l => l.classList.add('melt-out'));
    setTimeout(() => { window.location.href = url; }, TRANSITION_DURATION);
  }

  document.querySelectorAll('.img-item.clickable').forEach(item => {
    const target = item.dataset.href;
    if (!target || target === 'INSERT-REDIRECT-PAGE-HERE') return;

    item.addEventListener('click', () => navigateTo(target));
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        navigateTo(target);
      }
    });
  });
</script>
