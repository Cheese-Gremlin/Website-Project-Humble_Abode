     /* Keyboard users need to see where focus is */
    :focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    /* Respect users who prefer less motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* =============================================

    body {

    /* =============================================
       IMAGE POSITIONING SYSTEM
       How it works:
       - .img-layer is a fixed container covering the
         full screen, anchored to the TOP-LEFT corner.
       - Each .img-item is positioned relative to that
         top-left corner using:
             top:   distance DOWN  from top of screen
             left: distance LEFT  from left of screen
       - Change width/height on each .img-item to scale.
       - Set pointer-events: none on non-clickable images.
       ============================================= */

    .img-layer {
      position: fixed;
      top: 7vh;
      left: 50vw;      /* ----------------------------------- */
      width: 0;
      height: 0;
      pointer-events: none; /* layer itself doesn't block clicks */
      z-index: 10;          /* sits above page content; lower if needed */
    }

    .img-item {
      position: absolute;
      display: block;
      overflow: hidden;
    }

    .img-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Non-clickable images */
    .img-item.static {
      pointer-events: none;
    }

    /* Clickable images */
    .img-item.clickable {               
      pointer-events: auto;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;        
    }

    .img-item.clickable:hover {  /* what image looks like when hovering over */
      opacity: 1;
      transform: scale(1.03);
    }

<script>
  // =============================================
  // PAGE TRANSITION — "MELT" EFFECT
  // Tweak these two values to adjust the feel:
  // =============================================
  const TRANSITION_DURATION = 300;   // milliseconds — how long each half takes
  const TRANSITION_DRIFT    = 20;    // pixels — how far down the page "melts"

  // Inject the transition styles
  const style = document.createElement('style');
  style.textContent = `
    .img-layer {
      transition: opacity ${TRANSITION_DURATION}ms ease,
                  transform ${TRANSITION_DURATION}ms ease,
                  filter ${TRANSITION_DURATION}ms ease;
    }
    .img-layer.melt-out {
      opacity: 0;
      transform: translateY(${TRANSITION_DRIFT}px);
      filter: blur(6px);
    }
    .img-layer.melt-in {
      opacity: 0;
      transform: translateY(-${TRANSITION_DRIFT}px);
      filter: blur(6px);
    }
  `;
  document.head.appendChild(style);

  // Fade IN on page load
  const layer = document.querySelector('.img-layer');
  layer.classList.add('melt-in');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => layer.classList.remove('melt-in'));
  });

  // Fade OUT then navigate on click/keydown
  function navigateTo(url) {
    layer.classList.add('melt-out');
    setTimeout(() => { window.location.href = url; }, TRANSITION_DURATION);
  }

  document.querySelectorAll('.img-item.clickable').forEach(item => {
    const target = item.dataset.href;
    if (!target || target === 'INSERT-REDIRECT-PAGE-HERE') return;

    item.addEventListener('click', () => navigateTo(target));
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        navigateTo(target);
      }
    });
  });
</script>
